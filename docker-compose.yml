# EonTrading — distributed live pipeline
#
# Usage:
#   docker compose up -d              # start all
#   docker compose up -d single       # single-process mode only
#   docker compose logs -f            # tail all logs
#   docker compose down               # stop all
#
# Env vars: copy .env to same directory, or set inline:
#   BROKER=alpaca docker compose up -d

services:
  # --- Single process mode (all-in-one) ---
  single:
    build: .
    command: python3 -m src.live.news_trader
    env_file: .env
    environment:
      - BROKER=${BROKER:-log}
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    profiles: ["single"]

  # --- Distributed mode (one container per runner) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  watcher:
    build: .
    command: python3 -m src.live.runners.run_watcher
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - PERSIST_NEWS=${PERSIST_NEWS:-}
      - PUBLISH_PIPELINE=${PUBLISH_PIPELINE:-1}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    profiles: ["distributed"]

  analyzer:
    build: .
    command: python3 -m src.live.runners.run_analyzer
    env_file: .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    profiles: ["distributed"]

  trader:
    build: .
    command: python3 -m src.live.runners.run_trader
    env_file: .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    profiles: ["distributed"]

  executor:
    build: .
    command: python3 -m src.live.runners.run_executor
    env_file: .env
    environment:
      - BROKER=${BROKER:-log}
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    profiles: ["distributed"]

  monitor:
    build: .
    command: python3 -m src.live.runners.run_monitor
    env_file: .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    profiles: ["distributed"]

  # --- Dashboard (both modes) ---
  api:
    build: .
    command: uvicorn src.api.server:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  redis-data:
